name: Build DuyKhanhOS ISO

# Tự động chạy mỗi khi bạn Push code mới lên nhánh main/master hoặc chạy thủ công bằng tay
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    # 1. Kéo toàn bộ mã nguồn từ Repo GitHub của bạn vào máy ảo Build
    - name: Checkout repository code
      uses: actions/checkout@v4

    # 2. Cài đặt các công cụ Linux cần thiết để đóng gói và cấu hình Boot (GRUB)
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          debootstrap \
          squashfs-tools \
          xorriso \
          grub-pc-bin \
          grub-efi-amd64-bin \
          mtools \
          libx11-dev \
          build-essential

    # 3. Cấp quyền thực thi cho file script build của bạn
    - name: Make scripts executable
      run: |
        chmod +x iso_builder.sh
        if [ -f duykhanh-fetch.sh ]; then chmod +x duykhanh-fetch.sh; fi

    # 4. Kích hoạt file iso_builder.sh để bắt đầu quá trình build OS
    - name: Run ISO Builder Script
      run: |
        sudo ./iso_builder.sh

    # 5. Đóng gói file ISO thành phẩm và đẩy lên GitHub để bạn tải xuống
    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DuyKhanhOS-ISO
        path: |
          *.iso
          live_boot/*.iso
        if-no-files-found: error
        retention-days: 7
