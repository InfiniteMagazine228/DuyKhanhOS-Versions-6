name: DuyKhanhOS v6 ISO Modification Factory

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  modify-iso:
    name: Mổ ISO Arch Linux và Nhúng DuyKhanhOS v6
    runs-on: ubuntu-latest
    steps:
    - name: Checkout mã nguồn DuyKhanhOS
      uses: actions/checkout@v4

    - name: Cài đặt công cụ chỉnh sửa ISO
      run: |
        sudo apt-get update
        sudo apt-get install -y squashfs-tools xorriso intel-microcode gcc libx11-dev wget

    - name: 🔥 Bước 1: Biên dịch DuyKhanhWM và chuẩn bị file Fetch
      run: |
        gcc -o duykhanhwm duykhanhwm.c -lX11
        
        cat <<'EOF' > duykhanhfetch
        #!/bin/bash
        echo -e "\e[36m    ____             __ __                 __  ____  _____\e[0m"
        echo -e "\e[36m   / __ \__  __ __  / // /_  ______  _____/ / / __ \/ ___/\e[0m"
        echo -e "\e[36m  / / / / / / / / / / / __ \/ __  / / __  / / / / / /\___ \ \e[0m"
        echo -e "\e[31m / /_/ / /_/ / /_/ / / / / / /_/ / / /_/ / / / /_/ /___/ /\e[0m"
        echo -e "\e[31m/_____/\____/\__,_/_/_/ /_/\__,_/_/\__,_/_/_/\____/____/ \e[0m"
        echo ""
        echo -e "\e[32mOS:\e[0m DuyKhanhOS v6 (Arch modified)"
        echo -e "\e[32mKernel:\e[0m $(uname -r)"
        echo -e "\e[32mUptime:\e[0m $(uptime -p)"
        echo -e "\e[32mGUI:\e[0m DuyKhanh Custom GUI v1.0 (X11)"
        EOF
        chmod +x duykhanhfetch

    - name: 🌐 Bước 2: Tải ISO Arch Linux chính thức mới nhất
      run: |
        mkdir -p iso_source iso_mnt squashfs_root custom_iso
        wget -O archlinux.iso https://pkgbuild.com

    - name: 🛠️ Bước 3: Giải nén cấu trúc ISO gốc
      run: |
        xorriso -osirrox on -indev archlinux.iso -extract / custom_iso/
        chmod -R +w custom_iso/
        sudo unsquashfs -d squashfs_root custom_iso/arch/x86_64/airootfs.sfs

    - name: 🎨 Bước 4: Thay thế cấu hình và chèn đồ chơi DuyKhanhOS (Kali-vibe)
      run: |
        # 1. Đưa file GUI và Fetch tự làm vào phân hệ lệnh hệ thống
        sudo cp duykhanhwm squashfs_root/usr/local/bin/
        sudo cp duykhanhfetch squashfs_root/usr/local/bin/
        
        # 2. Cấu hình tự động chạy Terminal và gọi giao diện khi Boot Live ISO
        sudo mkdir -p squashfs_root/etc/skel/
        cat <<'EOF' | sudo tee squashfs_root/etc/skel/.xinitrc
        export GTK_THEME=Adwaita-dark
        xsetroot -solid '#0f141c'
        (alacritty || xterm || xfce4-terminal) -e duykhanhfetch &
        exec duykhanhwm
        EOF

        # 3. Trích xuất nhãn đĩa ISO hiện tại để ghi vào cấu hình GRUB mà không làm hỏng cú pháp YAML
        ISO_LABEL=$(date +%Y%m)
        
        # 4. Độ lại màu sắc và tiêu đề Menu Boot GRUB
        cat <<EOF | sudo tee custom_iso/boot/grub/grub.cfg
        set timeout=5
        set default=0
        set menu_color_normal=light-blue/black
        set menu_color_highlight=black/light-blue

        menuentry 'Khởi động DuyKhanhOS v6 (Kali-vibe Đồ Họa)' {
            linux /boot/vmlinuz-linux archisobasedir=arch archisolabel=ARCH_$ISO_LABEL cow_spacesize=10G
            initrd /boot/initramfs-linux.img
        }
        EOF

    - name: 📦 Bước 5: Đóng gói lại thành file ISO và IMG của DuyKhanhOS
      run: |
        sudo rm -f custom_iso/arch/x86_64/airootfs.sfs
        sudo mksquashfs squashfs_root custom_iso/arch/x86_64/airootfs.sfs -comp xz
        mkdir -p out_iso
        
        xorriso -as mkisofs \
          -iso-level 3 \
          -full-iso9660-filenames \
          -volid "DUYKHANHOS_V6" \
          -eltorito-boot boot/syslinux/isolinux.bin \
          -eltorito-catalog boot/syslinux/boot.cat \
          -no-emul-boot -boot-load-size 4 -boot-info-table \
          -isohybrid-mbr custom_iso/boot/syslinux/isohdpfx.bin \
          -output out_iso/duykhanhos-v6.iso custom_iso/

        cp out_iso/duykhanhos-v6.iso out_iso/duykhanhos-v6.img

    - name: 🚀 Bước 6: Đẩy sản phẩm lên mục GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name || 'v6.0-snapshot' }}
        name: DuyKhanhOS Version v6.0-Release (Modified Core)
        draft: false
        prerelease: false
        files: |
          out_iso/duykhanhos-v6.iso
          out_iso/duykhanhos-v6.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
