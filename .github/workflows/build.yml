name: DuyKhanhOS v6 ISO Modification Factory

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  modify-iso:
    name: Mo ISO Arch Linux va Nhungs DuyKhanhOS v6
    runs-on: ubuntu-latest
    steps:
    - name: Checkout ma nguon DuyKhanhOS
      uses: actions/checkout@v4

    - name: Cai dat cong cu chinh sua ISO
      run: |
        sudo apt-get update
        sudo apt-get install -y squashfs-tools xorriso intel-microcode gcc libx11-dev wget

    - name: 🔥 Buoc 1: Bien dich DuyKhanhWM va tao script Fetch
      run: |
        gcc -o duykhanhwm duykhanhwm.c -lX11
        
        # Tao file script duykhanhfetch an toan bang cach xu ly tung dong chu khong dung EOF long nhau
        echo '#!/bin/bash' > duykhanhfetch
        echo 'echo -e "\e[36m    ____             __ __                 __  ____  _____\e[0m"' >> duykhanhfetch
        echo 'echo -e "\e[36m   / __ \__  __ __  / // /_  ______  _____/ / / __ \/ ___/\e[0m"' >> duykhanhfetch
        echo 'echo -e "\e[36m  / / / / / / / / / / / __ \/ __  / / __  / / / / / /\___ \ \e[0m"' >> duykhanhfetch
        echo 'echo -e "\e[31m / /_/ / /_/ / /_/ / / / / / /_/ / / /_/ / / / /_/ /___/ /\e[0m"' >> duykhanhfetch
        echo 'echo -e "\e[31m/_____/\____/\__,_/_/_/ /_/\__,_/_/\__,_/_/_/\____/____/ \e[0m"' >> duykhanhfetch
        echo 'echo ""' >> duykhanhfetch
        echo 'echo -e "\e[32mOS:\e[0m DuyKhanhOS v6 (Arch modified)"' >> duykhanhfetch
        echo 'echo -e "\e[32mKernel:\e[0m \$(uname -r)"' >> duykhanhfetch
        echo 'echo -e "\e[32mUptime:\e[0m \$(uptime -p)"' >> duykhanhfetch
        echo 'echo -e "\e[32mGUI:\e[0m DuyKhanh Custom GUI v1.0 (X11)"' >> duykhanhfetch
        chmod +x duykhanhfetch

    - name: 🌐 Buoc 2: Tai ISO Arch Linux chinh thuc moi nhat
      run: |
        mkdir -p iso_source iso_mnt squashfs_root custom_iso
        wget -O archlinux.iso https://pkgbuild.com

    - name: 🛠️ Buoc 3: Giai nen cau truc ISO goc
      run: |
        xorriso -osirrox on -indev archlinux.iso -extract / custom_iso/
        chmod -R +w custom_iso/
        sudo unsquashfs -d squashfs_root custom_iso/arch/x86_64/airootfs.sfs

    - name: 🎨 Buoc 4: Thay the cau hinh va chen do choi DuyKhanhOS (Kali-vibe)
      run: |
        # 1. Dua file GUI va Fetch vao he thong
        sudo cp duykhanhwm squashfs_root/usr/local/bin/
        sudo cp duykhanhfetch squashfs_root/usr/local/bin/
        
        # 2. Cau hinh tu dong chay Terminal va goi giao dien khi Boot Live ISO
        sudo mkdir -p squashfs_root/etc/skel/
        echo "export GTK_THEME=Adwaita-dark" | sudo tee squashfs_root/etc/skel/.xinitrc
        echo "xsetroot -solid '#0f141c'" | sudo tee -a squashfs_root/etc/skel/.xinitrc
        echo "(alacritty || xterm || xfce4-terminal) -e duykhanhfetch &" | sudo tee -a squashfs_root/etc/skel/.xinitrc
        echo "exec duykhanhwm" | sudo tee -a squashfs_root/etc/skel/.xinitrc

        # 3. Do lai mau sac va tieu de Menu Boot GRUB (Khai bao tinh truc tiep)
        sudo mkdir -p custom_iso/boot/grub/
        echo "set timeout=5" | sudo tee custom_iso/boot/grub/grub.cfg
        echo "set default=0" | sudo tee -a custom_iso/boot/grub/grub.cfg
        echo "set menu_color_normal=light-blue/black" | sudo tee -a custom_iso/boot/grub/grub.cfg
        echo "set menu_color_highlight=black/light-blue" | sudo tee -a custom_iso/boot/grub/grub.cfg
        echo "menuentry 'Khoi dong DuyKhanhOS v6 (Kali-vibe Do Hoa)' {" | sudo tee -a custom_iso/boot/grub/grub.cfg
        echo "    linux /boot/vmlinuz-linux archisobasedir=arch cow_spacesize=10G" | sudo tee -a custom_iso/boot/grub/grub.cfg
        echo "    initrd /boot/initramfs-linux.img" | sudo tee -a custom_iso/boot/grub/grub.cfg
        echo "}" | sudo tee -a custom_iso/boot/grub/grub.cfg

    - name: 📦 Buoc 5: Dong goi lai thanh file ISO va IMG cua DuyKhanhOS
      run: |
        sudo rm -f custom_iso/arch/x86_64/airootfs.sfs
        sudo mksquashfs squashfs_root custom_iso/arch/x86_64/airootfs.sfs -comp xz
        mkdir -p out_iso
        
        xorriso -as mkisofs \
          -iso-level 3 \
          -full-iso9660-filenames \
          -volid "DUYKHANHOS_V6" \
          -eltorito-boot boot/syslinux/isolinux.bin \
          -eltorito-catalog boot/syslinux/boot.cat \
          -no-emul-boot -boot-load-size 4 -boot-info-table \
          -isohybrid-mbr custom_iso/boot/syslinux/isohdpfx.bin \
          -output out_iso/duykhanhos-v6.iso custom_iso/

        cp out_iso/duykhanhos-v6.iso out_iso/duykhanhos-v6.img

    - name: 🚀 Buoc 6: Day san pham len muc GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name || 'v6.0-snapshot' }}
        name: DuyKhanhOS Version v6.0-Release
        draft: false
        prerelease: false
        files: |
          out_iso/duykhanhos-v6.iso
          out_iso/duykhanhos-v6.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
