name: Build DuyKhanhOS ISO

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-os:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          debootstrap \
          squashfs-tools \
          xorriso \
          grub-pc-bin \
          grub-efi-amd64-bin \
          mtools \
          libx11-dev \
          build-essential

    - name: Make scripts executable
      run: |
        chmod +x iso_builder.sh
        if [ -f duykhanh-fetch.sh ]; then chmod +x duykhanh-fetch.sh; fi

    - name: Run ISO Builder Script
      run: |
        sudo ./iso_builder.sh

    - name: Upload ISO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DuyKhanhOS-ISO
        path: |
          *.iso
          live_boot/*.iso
        if-no-files-found: error
        retention-days: 7
