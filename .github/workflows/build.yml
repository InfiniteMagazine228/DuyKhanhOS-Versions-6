name: DuyKhanhOS v6 Factory

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Chạy lệnh đóng gói hệ điều hành
      run: bash iso_builder.sh

    - name: Đẩy sản phẩm lên mục Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: DuyKhanhOS Version v6.0-Release (Stable Core)
        draft: false
        prerelease: false
        files: |
          out_iso/duykhanhos-v6.iso
          out_iso/duykhanhos-v6.img
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
