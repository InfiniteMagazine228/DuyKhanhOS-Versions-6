set timeout=5
set default=0

# Thiết kế màu sắc giao diện menu GRUB (Chữ/Nền)
set menu_color_normal=cyan/black
set menu_color_highlight=white/blue

menuentry "DuyKhanhOS v6 (Arch Linux Core)" {
    set root=(hd0,1)
    linux /boot/vmlinuz-linux root=/dev/sda1 rw quiet
    initrd /boot/initramfs-linux.img
}

menuentry "DuyKhanhOS v6 (Chế độ Cứu hộ Fallback)" {
    set root=(hd0,1)
    linux /boot/vmlinuz-linux root=/dev/sda1 rw single
    initrd /boot/initramfs-linux-fallback.img
}
